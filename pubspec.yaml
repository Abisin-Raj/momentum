name: momentum
description: "A cycle-based, offline-first fitness tracker that progresses only when you do."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  
  # Database (Offline-First)
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Routing
  go_router: ^17.1.0
  url_launcher: ^6.3.0
  
  # UI & Theme
  dynamic_color: ^1.7.0
  google_fonts: ^8.0.2
  
  # Android Widget
  home_widget: ^0.9.0
  shared_preferences: ^2.3.2
  
  # Utilities
  intl: ^0.20.2
  http: ^1.2.2
  connectivity_plus: ^7.0.0
  image_picker: ^1.2.1
  
  # Charts & Visuals
  fl_chart: ^1.2.0
  
  # Export & Backup
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  
  # Health Connect
  health: ^13.3.1
  permission_handler: ^12.0.1
  google_generative_ai: ^0.4.7
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_secure_storage: ^10.0.0
  webview_flutter: ^4.8.0
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3
  flutter_displaymode: ^0.7.0
  crypto: ^3.0.7
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.13.0
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/3d/
    - assets/3d/js/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_logo.jpg"
  min_sdk_android: 21
  # adaptive_icon_background: "#121212"
  # adaptive_icon_foreground: "assets/images/app_logo.jpg"
